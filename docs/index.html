<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loxi - Lox interpreter playground</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link rel="icon" type="image/x-icon" href="./loki.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libertinus+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="top-bar">
      <h1>LOXI</h1>
      <p>
        Bytecode interpreter for
        <a href="https://craftinginterpreters.com/the-lox-language.html">Lox</a
        >, written in <a href="https://odin-lang.org/">Odin</a>
      </p>
      <a href="https://github.com/shettysach/Loxi">[Source]</a>
      <a href="https://craftinginterpreters.com/">[Crafting Interpreters]</a>
      <button onclick="submitCode()" title="Ctrl+Return">▶ Run</button>
    </div>

    <div id="main">
      <div id="left-panel">
        <div class="editor-container">
          <div id="line-numbers"></div>
          <textarea id="code-input" placeholder="Type your Lox code here.">
class Seq {
  init(p) {
    this.prev = p;
    this.curr = 1;
  }
}

class Fib < Seq {
  init() {
    super.init(0);
  }

  next() {
    var res = this.prev;
    var nxt = this.prev + this.curr;
    this.prev = this.curr;
    this.curr = nxt;
    return res;
  }
}

class Fact < Seq {
  init() {
    super.init(1);
  }

  next() {
    var res = this.prev;
    this.prev = this.prev * this.curr;
    this.curr = this.curr + 1;
    return res;
  }
}

print("Fibonacci");
var fib = Fib();
for (var i = 0; i < 10; i = i + 1) {
  print fib.next();
}

print("Factorial");
var fact = Fact();
for (var i = 0; i < 10; i = i + 1) {
  print fact.next();
}</textarea
          >
        </div>
      </div>

      <div id="right-panel">
        <div id="output" placeholder="Output appears here."></div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
