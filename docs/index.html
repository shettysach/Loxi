<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loxi - Lox interpreter playground</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link rel="icon" type="image/x-icon" href="./loki.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libertinus+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="top-bar">
      <h1><a href="https://shettysach.io.github/Loxi">LOXI</a></h1>
      <p>
        Bytecode interpreter for
        <a href="https://craftinginterpreters.com/the-lox-language.html">Lox</a
        >, written in <a href="https://odin-lang.org/">Odin</a>
      </p>
      <a href="https://github.com/shettysach/Loxi">[Source]</a>
      <a href="https://craftinginterpreters.com/">[Crafting Interpreters]</a>
      <select id="example-dropdown" title="Select an example">
        <option value="" disabled selected>Select an example</option>
      </select>
      <button onclick="submitCode()" title="Ctrl+Enter">▶ Run</button>
    </div>

    <div id="main">
      <div id="left-panel">
        <div class="editor-container">
          <div id="line-numbers"></div>
          <textarea
            id="code-input"
            placeholder="Type your Lox code here."
          ></textarea>
        </div>
      </div>

      <div id="right-panel">
        <div id="output" placeholder="Output appears here."></div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
